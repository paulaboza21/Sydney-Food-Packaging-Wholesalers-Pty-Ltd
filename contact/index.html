<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Sydney Food & Packaging Wholesalers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Space Grotesk", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            colors: {
              sand: "#f7f1e8",
              ink: "#17211b",
              moss: "#294d3a",
              clay: "#c96a2b",
              cream: "#fffaf3",
              line: "rgba(23, 33, 27, 0.08)"
            },
            boxShadow: {
              soft: "0 24px 70px rgba(93, 62, 27, 0.12)"
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body class="bg-sand text-ink">
    <div class="page-aura"></div>
    <div class="relative mx-auto min-h-screen w-full max-w-7xl px-4 pb-10 pt-4 sm:px-6 lg:px-8">
      <header id="site-header"></header>
      <main id="app" class="mt-6"></main>
      <footer id="site-footer" class="mt-6"></footer>
    </div>
    <script type="module" src="/contact/contact.js"></script>
  </body>
</html>
